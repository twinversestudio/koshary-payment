<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - ???? ??????????</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            color: #ffd700;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

            .stat-box h3 {
                color: #aaa;
                font-size: 14px;
                margin-bottom: 10px;
            }

            .stat-box .number {
                font-size: 32px;
                font-weight: bold;
                color: #4CAF50;
            }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            color: #ffd700;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }

            .btn:hover {
                background: #45a049;
            }

            .btn:disabled {
                background: #666;
                cursor: not-allowed;
            }

        .status-pending {
            color: #ff9800;
        }

        .status-paid {
            color: #4CAF50;
        }

        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: rgba(0,0,0,0.3);
            color: white;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginScreen" class="login-box">
            <h2>?? ????? ??????</h2>
            <input type="password" id="password" placeholder="????????">
            <button class="login-btn" onclick="login()">????</button>
        </div>

        <div id="dashboard" style="display: none;">
            <h1> Dashboard</h1>

            <div class="stats">
                <div class="stat-box">
                    <h3>? ?? ????????</h3>
                    <div class="number" id="pendingCount">0</div>
                </div>
                <div class="stat-box">
                    <h3>? ?????? ?????</h3>
                    <div class="number" id="todayCount">0</div>
                </div>
                <div class="stat-box">
                    <h3>?? ?????? ?????</h3>
                    <div class="number" id="todayRevenue">0 ?</div>
                </div>
            </div>

            <h2>?? ???????</h2>
            <table>
                <thead>
                    <tr>
                        <th>?????</th>
                        <th>??? ?????</th>
                        <th>??????</th>
                        <th>???????</th>
                        <th>??????</th>
                        <th>???????</th>
                        <th>??????</th>
                        <th>?????</th>
                    </tr>
                </thead>
                <tbody id="ordersTable">
                </tbody>
            </table>

            <button onclick="loadOrders()" style="margin-top: 20px; padding: 10px 20px;">?? ?????</button>
        </div>
    </div>

    <script>let adminPassword = '';

    function login() {
      adminPassword = document.getElementById('password').value;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadOrders();
    }

    async function loadOrders() {
      // ?? ?????? ????? API endpoint ???? ???? ?? ???????
      // ?????? ??????? ????? ?????

      const response = await fetch('/api/orders?password=' + adminPassword);
      const data = await response.json();

      const tbody = document.getElementById('ordersTable');
      tbody.innerHTML = '';

      data.orders.forEach(order => {
        const row = document.createElement('tr');
        const time = new Date(order.createdAt).toLocaleString('ar-EG');
        const methodNames = {
          vodafone: '?? ???????',
          instapay: '?? ????? ???',
          telda: '?? ?????',
          card: '?? ?????'
        };

        row.innerHTML = `
          <td>${time}</td>
          <td><code>${order.orderId}</code></td>
          <td>${order.playerId}</td>
          <td>${order.amount}</td>
          <td>${order.price} ?</td>
          <td>${methodNames[order.method] || order.method}</td>
          <td class="status-${order.status}">${order.status === 'pending' ? '? ??????' : '? ??'}</td>
          <td>
            ${order.status === 'pending'
              ? `<button class="btn" onclick="confirmOrder('${order.orderId}')">?????</button>`
              : '-'}
          </td>
        `;
        tbody.appendChild(row);
      });

      // ??? ??????????
      document.getElementById('pendingCount').textContent =
        data.orders.filter(o => o.status === 'pending').length;
    }

    async function confirmOrder(orderId) {
      if (!confirm('????? ????? ?? ' + orderId + '?')) return;

      const response = await fetch('/api/confirm', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          orderId: orderId,
          adminPassword: adminPassword
        })
      });

      if (response.ok) {
        alert('? ?? ???????!');
        loadOrders();
      } else {
        alert('? ??? ???');
      }
    }</script>
</body>
</html>
