<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - كشري سيميوليتور</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

            .stat-box h3 {
                color: #aaa;
                font-size: 12px;
                margin-bottom: 8px;
            }

            .stat-box .number {
                font-size: 24px;
                font-weight: bold;
                color: #4CAF50;
            }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 13px;
        }

        th, td {
            padding: 10px;
            text-align: right;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            color: #ffd700;
            background: rgba(0,0,0,0.2);
            font-size: 12px;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        td {
            font-size: 12px;
        }

        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
        }

            .btn:hover {
                background: #45a049;
            }

            .btn:disabled {
                background: #666;
                cursor: not-allowed;
            }

        .status-pending {
            color: #ff9800;
        }

        .status-paid {
            color: #4CAF50;
        }

        .login-box {
            max-width: 350px;
            margin: 80px auto;
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }

            .login-box h2 {
                margin-bottom: 20px;
                color: #ffd700;
                font-size: 20px;
            }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 14px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .refresh-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .error {
            color: #ff4444;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginScreen" class="login-box">
            <h2>🔐 تسجيل الدخول</h2>
            <input type="password" id="password" placeholder="الباسورد">
            <button class="login-btn" onclick="login()">دخول</button>
            <div id="loginError" class="error"></div>
        </div>

        <div id="dashboard" style="display: none;">
            <h1>🎮 كشري سيميوليتور - Dashboard</h1>

            <button class="refresh-btn" onclick="loadOrders()">🔄 تحديث</button>

            <div class="stats">
                <div class="stat-box">
                    <h3>⏳ في الانتظار</h3>
                    <div class="number" id="pendingCount">0</div>
                </div>
                <div class="stat-box">
                    <h3>✅ مكتملة</h3>
                    <div class="number" id="paidCount">0</div>
                </div>
                <div class="stat-box">
                    <h3>💰 إجمالي</h3>
                    <div class="number" id="totalRevenue">0 ج</div>
                </div>
            </div>

            <h2 style="font-size: 18px; margin-bottom: 10px;">📋 الطلبات</h2>
            <table>
                <thead>
                    <tr>
                        <th>الوقت</th>
                        <th>الطلب</th>
                        <th>اللاعب</th>
                        <th>عملات</th>
                        <th>مبلغ</th>
                        <th>طريقة</th>
                        <th>حالة</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="ordersTable">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let adminPassword = '';

        function login() {
            const pass = document.getElementById('password').value;
            if (!pass) {
                document.getElementById('loginError').textContent = 'ادخل الباسورد';
                return;
            }
            adminPassword = pass;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadOrders();
        }

        async function loadOrders() {
            try {
                const response = await fetch('/api/orders?password=' + encodeURIComponent(adminPassword));

                if (!response.ok) {
                    if (response.status === 401) {
                        alert('باسورد غلط');
                        location.reload();
                        return;
                    }
                    throw new Error('Error loading');
                }

                const data = await response.json();

                const tbody = document.getElementById('ordersTable');
                tbody.innerHTML = '';

                let pending = 0;
                let paid = 0;
                let revenue = 0;

                const methodNames = {
                    vodafone: '📱 فودافون',
                    instapay: '🏦 إنستا باي',
                    telda: '💳 تيلدا',
                    card: '💳 بطاقة'
                };

                data.orders.forEach(order => {
                    if (order.status === 'pending') pending++;
                    if (order.status === 'paid') {
                        paid++;
                        revenue += order.price;
                    }

                    const time = new Date(order.createdAt).toLocaleString('ar-EG', {
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    const row = document.createElement('tr');
                    row.innerHTML = `
                <td>${time}</td>
                <td><code style="font-size: 10px;">${order.orderId}</code></td>
                <td><code style="font-size: 10px;">${order.playerId.substring(0, 12)}...</code></td>
                <td>${order.amount}</td>
                <td>${order.price} ج</td>
                <td>${methodNames[order.method] || order.method}</td>
                <td class="status-${order.status}">
                  ${order.status === 'pending' ? '⏳' : '✅'}
                </td>
                <td>
                  ${order.status === 'pending'
                            ? `<button class="btn" onclick="confirmOrder('${order.orderId}')">تأكيد</button>`
                            : '-'}
                </td>
              `;
                    tbody.appendChild(row);
                });

                document.getElementById('pendingCount').textContent = pending;
                document.getElementById('paidCount').textContent = paid;
                document.getElementById('totalRevenue').textContent = revenue + ' ج';

            } catch (error) {
                console.error(error);
                alert('حدث خطأ في تحميل الطلبات');
            }
        }

        async function confirmOrder(orderId) {
            if (!confirm('تأكيد الدفع لـ ' + orderId + '؟')) return;

            try {
                const response = await fetch('/api/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        orderId: orderId,
                        adminPassword: adminPassword
                    })
                });

                if (response.ok) {
                    alert('✅ تم التأكيد!');
                    loadOrders();
                } else {
                    const err = await response.json();
                    alert('❌ خطأ: ' + (err.error || 'Unknown error'));
                }
            } catch (error) {
                alert('❌ حدث خطأ في الاتصال');
            }
        }
    </script>
</body>
</html>
